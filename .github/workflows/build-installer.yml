name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional, shown in run name)"
        required: false
        default: "manual test build"
  push:
    branches:
      - "claude/**"
      - "feature/installer**"
    paths-ignore:
      - "docs/**"
      - "**/*.md"

run-name: "Installer build — ${{ inputs.reason || github.event.head_commit.message }}"

permissions:
  contents: read

concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (moving)
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Sync version
        shell: pwsh
        run: ./tools/sync-version.ps1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Clean stale bundle output (avoid picking up old .exe from cache)
        shell: pwsh
        run: |
          if (Test-Path target/release/bundle/nsis) {
            Remove-Item target/release/bundle/nsis/*.exe -Force -ErrorAction SilentlyContinue
            Write-Host "Cleared stale .exe files from target/release/bundle/nsis/"
          } else {
            Write-Host "No stale bundle dir to clean."
          }

      - name: Build NSIS installer
        run: npx --yes @tauri-apps/cli build --bundles nsis

      - name: Locate built installer
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target/release/bundle/nsis -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in target/release/bundle/nsis" }
          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Found: $($exe.FullName)"

      - name: Upload installer as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-installer
          path: ${{ steps.locate.outputs.exe_path }}
          retention-days: 14
          if-no-files-found: error

      - name: Build gen_pdf CLI binary
        shell: pwsh
        run: cargo build --release --bin gen_pdf

      - name: Smoke-test gen_pdf on portiekwoning fixture
        shell: pwsh
        run: |
          $bin = "target/release/gen_pdf.exe"
          $fixture = "tests/fixtures/portiekwoning.json"
          $out = "target/portiekwoning-smoke.pdf"
          if (-not (Test-Path $fixture)) {
            Write-Host "Fixture niet gevonden — gen_pdf binary alleen geüpload, geen smoke-PDF."
            exit 0
          }
          & $bin $fixture $out
          Write-Host "Smoke PDF: $out ($((Get-Item $out).Length) bytes)"

      - name: Upload gen_pdf binary + smoke PDF
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gen-pdf-cli
          path: |
            target/release/gen_pdf.exe
            target/portiekwoning-smoke.pdf
          retention-days: 14
          if-no-files-found: warn
