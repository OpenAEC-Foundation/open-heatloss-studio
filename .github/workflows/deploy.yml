name: Build & Push

on:
  push:
    branches: [master]

concurrency:
  group: build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openaec-foundation/warmteverliesberekening

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Calculate build number
        id: version
        run: |
          SEMVER=$(jq -r .version frontend/package.json)
          VERSION="${SEMVER}-build.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_OIDC_ISSUER=https://auth.open-aec.com/application/o/warmteverlies/
            VITE_OIDC_CLIENT_ID=warmteverlies
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
            SOURCE_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
