name: Build & Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openaec-foundation/warmteverliesberekening

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_OIDC_ISSUER=https://auth.open-aec.com/application/o/warmteverlies/
            VITE_OIDC_CLIENT_ID=warmteverlies
            SOURCE_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            REMOTE_DIR="/opt/warmteverlies"
            REPO="https://github.com/OpenAEC-Foundation/warmteverliesberekening.git"
            IMAGE="ghcr.io/openaec-foundation/warmteverliesberekening:latest"

            # Update docker-compose.yml en .env.production van repo
            if [ -d "${REMOTE_DIR}/.git" ]; then
                cd "${REMOTE_DIR}"
                git fetch origin
                git reset --hard origin/master
            else
                git clone --branch master "${REPO}" "${REMOTE_DIR}"
                cd "${REMOTE_DIR}"
            fi

            # Pull het gebouwde image van GHCR
            docker pull "${IMAGE}"

            # Start/herstart met het gepulde image
            docker compose up -d

            echo "Waiting for container..."
            sleep 5
            docker exec warmteverlies curl -sf http://localhost:3001/api/v1/health && echo " OK" || echo " FAILED"
