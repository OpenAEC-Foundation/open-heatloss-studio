name: Build & Push

on:
  push:
    branches: [master]

concurrency:
  group: build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openaec-foundation/warmteverliesberekening
  VERSION_PREFIX: "0.1"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate build number
        id: version
        run: |
          BUILD_NUM=${{ github.run_number }}
          VERSION="${{ env.VERSION_PREFIX }}.$(printf '%02d' $BUILD_NUM)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_OIDC_ISSUER=https://auth.open-aec.com/application/o/warmteverlies/
            VITE_OIDC_CLIENT_ID=warmteverlies
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
            SOURCE_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
