name: Tests

on:
  push:
    branches: [master]
  pull_request:

# Verouderde runs op dezelfde branch/PR annuleren zodra een nieuwe start.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    steps:
      # submodules: libs/openaec-reports is een git-submodule; cargo moet
      # álle workspace-manifests kunnen laden (ook dat van isso51-desktop,
      # óók met --exclude) en die heeft een path-dep op openaec-layout
      # in die submodule.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (moving)

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # --exclude isso51-desktop: de Tauri-app-crate (src-tauri) vereist
      # systeem-deps (webkit2gtk e.d.) op Linux en heeft geen eigen tests.
      # De Vabi-verificatieprojecten in tests/verification/ draaien hier mee
      # via o.a. crates/isso51-core/tests/integration_test.rs (±2W/±2%),
      # de isso53-goldens en de koellast-tests — dat is het hoofddoel van
      # deze workflow.
      - name: cargo test
        run: cargo test --workspace --exclude isso51-desktop

  frontend:
    name: Frontend typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      # Niet strikt nodig voor de frontend, maar goedkoop en voorkomt
      # verrassingen als frontend ooit iets uit libs/ importeert.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: vitest
        run: npx vitest run
